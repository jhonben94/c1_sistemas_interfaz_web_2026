<div class="chat-basic">
  @if (isOpen()) {
    <div
      class="chat-basic__panel"
      [id]="panelId"
      role="dialog"
      aria-modal="false"
      aria-label="Ayuda rápida Peón de Rey"
    >
      <header class="chat-basic__header">
        <h2 class="chat-basic__title">Ayuda rápida</h2>
        <button type="button" class="chat-basic__icon-btn" (click)="toggle()" aria-label="Cerrar">
          ×
        </button>
      </header>
      <div
        class="chat-basic__messages"
        role="log"
        aria-live="polite"
        aria-relevant="additions"
        aria-atomic="false"
      >
        @for (m of messages(); track m.id) {
          <p
            class="chat-basic__bubble"
            [class.chat-basic__bubble--user]="m.role === 'user'"
            [class.chat-basic__bubble--bot]="m.role === 'bot'"
          >
            <span class="visually-hidden">{{ m.role === 'user' ? 'Tú: ' : 'Asistente: ' }}</span>
            {{ m.text }}
          </p>
        }
        @if (isTyping()) {
          <p class="chat-basic__bubble chat-basic__bubble--bot chat-basic__typing" aria-hidden="true">
            …
          </p>
        }
      </div>
      <div class="chat-basic__composer">
        <input
          type="text"
          class="chat-basic__input"
          placeholder="Precios, horario, envío…"
          [value]="draft()"
          (input)="onDraftInputEvent($event)"
          (keydown)="onKeydownEnter($event)"
          aria-label="Tu pregunta"
        />
        <button type="button" class="chat-basic__send" (click)="send()">Enviar</button>
      </div>
    </div>
  }

  <button
    type="button"
    class="chat-basic__fab"
    (click)="toggle()"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-controls]="isOpen() ? panelId : null"
    [attr.aria-label]="isOpen() ? 'Cerrar ayuda rápida' : 'Abrir ayuda rápida'"
  >
    @if (isOpen()) {
      <span aria-hidden="true">✕</span>
    } @else {
      <span aria-hidden="true">?</span>
    }
  </button>
</div>
